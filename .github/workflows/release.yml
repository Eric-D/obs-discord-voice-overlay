name: Release

# Triggers strictly on a SemVer-shaped tag push (vMAJOR.MINOR.PATCH).
# Tags like v1.0.0-alpha or V1.0.0 (uppercase V) will not match. To cut
# a release, push a tag matching the pattern below.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows release binary
    runs-on: windows-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      exe_name: ${{ steps.package.outputs.exe_name }}
      zip_name: ${{ steps.package.outputs.zip_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/',''
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Resolved version: $version"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release

      - name: Verify binary exists
        shell: pwsh
        run: |
          $bin = "target\release\obs-discord-voice-overlay.exe"
          if (-not (Test-Path $bin)) {
            Write-Error "Build did not produce $bin"
            exit 1
          }
          Get-Item $bin | Format-List Name,Length,LastWriteTime

      - name: Package release artifacts
        id: package
        shell: pwsh
        run: |
          $version = '${{ steps.resolve.outputs.version }}'
          $base = "obs-discord-voice-overlay-$version-x86_64-pc-windows-msvc"
          $exe = "$base.exe"
          $zip = "$base.zip"

          # Standalone exe (renamed for clarity in the release page)
          Copy-Item target\release\obs-discord-voice-overlay.exe $exe

          # Bundle: exe + docs in a zip
          New-Item -ItemType Directory -Path release | Out-Null
          Copy-Item target\release\obs-discord-voice-overlay.exe release\
          Copy-Item README.md release\
          Copy-Item LICENSE release\
          Copy-Item docs\ARCHITECTURE.md release\
          Compress-Archive -Path release\* -DestinationPath $zip

          echo "exe_name=$exe" >> $env:GITHUB_OUTPUT
          echo "zip_name=$zip" >> $env:GITHUB_OUTPUT

          Write-Host "=== Artifacts ==="
          Get-Item $exe,$zip | Format-Table Name,Length
          Get-FileHash $exe,$zip -Algorithm SHA256 | Format-List

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            ${{ steps.package.outputs.exe_name }}
            ${{ steps.package.outputs.zip_name }}
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: dist/

      - name: List downloaded files
        run: ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-windows.outputs.version }}
          name: ${{ needs.build-windows.outputs.version }}
          generate_release_notes: true
          files: |
            dist/${{ needs.build-windows.outputs.exe_name }}
            dist/${{ needs.build-windows.outputs.zip_name }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
