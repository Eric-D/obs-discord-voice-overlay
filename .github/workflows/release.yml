name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.1.0). Created if it does not exist.'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows release binary
    runs-on: windows-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      asset_name: ${{ steps.package.outputs.asset_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $version = '${{ inputs.tag }}'
          } else {
            $version = $env:GITHUB_REF -replace 'refs/tags/',''
          }
          if (-not $version.StartsWith('v')) { $version = "v$version" }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Resolved version: $version"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release

      - name: Package release archive
        id: package
        shell: pwsh
        run: |
          $version = '${{ steps.resolve.outputs.version }}'
          $name = "obs-discord-voice-overlay-$version-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path release | Out-Null
          Copy-Item target\release\obs-discord-voice-overlay.exe release\
          Copy-Item README.md release\
          Copy-Item docs\ARCHITECTURE.md release\
          Compress-Archive -Path release\* -DestinationPath "$name.zip"
          echo "asset_name=$name.zip" >> $env:GITHUB_OUTPUT
          Get-FileHash "$name.zip" -Algorithm SHA256 | Format-List

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ${{ steps.package.outputs.asset_name }}
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-windows.outputs.version }}
          name: ${{ needs.build-windows.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ needs.build-windows.outputs.asset_name }}
          draft: false
          prerelease: false
